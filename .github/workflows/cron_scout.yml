name: 5-Minute Price Scout

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Allows writing to the repo files
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Upgraded to v4 for 2026 stability

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth requests

      - name: Run Scout
        env:
          GSHEETS_SECRET: ${{ secrets.GSHEETS_JSON }}
        run: python scout_job.py

      # --- THE MEMORY FIX: Save the trades.csv back to GitHub ---
      - name: Commit and Push Trade Log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "george@thefirm.ai"
          git config --local user.name "George (Background Scout)"
          
          # 1. Add the file
          git add trades.csv
          
          # 2. Only commit if there are changes (prevents Error 1)
          if git diff --cached --quiet; then
            echo "No changes in trades.csv. Skipping commit."
          else
            git commit -m "Lawrence updated the Ledger [skip ci]"
            
            # 3. Push with the GITHUB_TOKEN for authority
            git push origin HEAD:main
          fi
