name: 5-Minute Price Scout

on:
  schedule:
    - cron: '*/5 * * * *'
  repository_dispatch:
    types: [ping_george]
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth requests

      - name: Run Scout
        env:
          GSHEETS_SECRET: ${{ secrets.GSHEETS_JSON }}
          GSHEET_ID: ${{ secrets.GSHEET_ID }}  # <--- Added this line
        run: python scout_job.py

      - name: Commit and Push Trade Log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "george@thefirm.ai"
          git config --local user.name "George (Background Scout)"
          
          git add -f trades.csv || true
          
          if git diff --cached --quiet; then
            echo "No new trades recorded. Skipping push."
          else
            git commit -m "Lawrence updated the Ledger [skip ci]"
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          fi
