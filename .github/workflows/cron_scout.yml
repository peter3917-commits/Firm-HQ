name: 5-Minute Price Scout

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # Master Key for the Vault
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Pulls full history to prevent "shallow" push errors

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth requests

      - name: Run Scout
        env:
          GSHEETS_SECRET: ${{ secrets.GSHEETS_JSON }}
        run: python scout_job.py

      # --- THE ULTIMATE PERMISSION BYPASS ---
      - name: Commit and Push Trade Log
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config --local user.email "george@thefirm.ai"
          git config --local user.name "George (Background Scout)"
          
          # Force add in case of local .gitignore conflicts
          git add -f trades.csv || true
          
          if git diff --cached --quiet; then
            echo "No new trades recorded by Lawrence. Skipping push."
          else
            git commit -m "Lawrence updated the Ledger [skip ci]"
            
            # This URL format is the "Nuclear Option" for Error 128
            git push "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" HEAD:main
          fi
