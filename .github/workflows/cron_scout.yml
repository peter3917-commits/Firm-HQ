name: 5-Minute Price Scout

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch:

jobs:
  scout:
    runs-on: ubuntu-latest
    permissions:
      contents: write  # <--- CRITICAL: Gives George permission to save files
    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install dependencies
        run: |
          pip install pandas gspread google-auth requests

      - name: Run Scout
        env:
          GSHEETS_SECRET: ${{ secrets.GSHEETS_JSON }}
        run: python scout_job.py

      # --- THE MEMORY FIX: Save the trades.csv back to GitHub ---
      - name: Commit and Push Trade Log
        run: |
          git config --local user.email "george@thefirm.ai"
          git config --local user.name "George (Background Scout)"
          git add trades.csv
          git commit -m "Lawrence updated the Ledger [skip ci]" || echo "No changes to commit"
          git push
